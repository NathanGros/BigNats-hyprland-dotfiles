# User name
label {
    monitor =
    text = $USER
    text_align = center
    color = rgba(30, 30, 46, 1.0)
    font_size = 18
    font_family = Sans Bold
    rotate = 0
    position = 130, 40
    halign = center
    valign = center
    shadow_passes = 0
    shadow_size = 0
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_boost = 1.2
}

# Password
input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.23
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    dots_text_format =
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(30, 30, 46, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    font_family = Sans Bold
    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = <span foreground='##cdd6f4'>Enter password</span>
    hide_input = false
    hide_input_base_color = rgba(153, 170, 187)
    rounding = 10
    check_color = rgba(137, 180, 250, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(249, 139, 168, 1.0)
    numlock_color = rgba(245, 194, 231, 1.0)
    bothlock_color = rgba(255, 40, 40, 1.0)
    invert_numlock = true
    swap_font_color = true
    position = 130, -20
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(30, 30, 46, 0.4)
    shadow_boost = 1.0
}
