general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 3000
}

animations {
    enabled = true

    bezier = easeIn, 0.22, 0.63, 0.1, 1
    bezier = easeOut, 0.9, 0, 0.78, 0.37
    bezier = easeInOut, 0.45, 0, 0.55, 1
    bezier = linear,0,0,1,1

    animation = fadeIn, 1, 7, easeInOut
    animation = fadeOut, 1, 5, easeInOut
}

# Background blur
background {
    monitor =
    path = $HOME/.config/wallpaper_shifted.png
    color = rgba(0, 0, 0, 0.3)
    blur_passes = 0
    blur_size = 0
    noise = 0.
    contrast = 0.9
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
    reload_time = -1
    reload_cmd =
    crossfade_time = 1
    zindex = -1
}

# Date time background
shape {
    monitor =
    size = 147, 35
    color = rgba(30, 30, 46, 1.0)
    rounding = 10
    rotate = 0
    border_size = 0
    border_color = rgba(0, 0, 0, 1.0)
    xray = false
    position = 0, -10
    halign = center
    valign = top
    zindex = 0
    shadow_passes = 0
    shadow_size = 0
    shadow_color = rgba(30, 30, 46, 0.4)
    shadow_boost = 1.0
}


# Date time
label {
    monitor =
    text = cmd[update:1000] echo $(date +"%a %-d %b %H:%M")
    text_align = center
    color = rgba(205, 214, 244, 1.0)
    font_size = 12
    font_family = Sans Bold
    rotate = 0
    position = 0, -15
    halign = center
    valign = top
    shadow_passes = 0
    shadow_size = 0
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_boost = 0.8
}

