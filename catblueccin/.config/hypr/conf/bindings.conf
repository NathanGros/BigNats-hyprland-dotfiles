$mainMod = SUPER

$minecraft = prime-run prismlauncher
$browser = prime-run zen-browser
$filemanager = nautilus
$discord = vesktop
$terminal = foot
$appmenu = ~/.config/hypr/scripts/appmenu_toggle.sh
$clipboard = ~/.config/hypr/scripts/clipboard_toggle.sh
$logout = ~/.config/hypr/scripts/logout_toggle.sh
$network = ~/.config/hypr/scripts/wifilist_toggle.sh
$networkssl = luakit http://neverssl.com
$recording = ~/.config/hypr/scripts/recording_toggle.sh
$screenshot = ~/.config/hypr/scripts/screenshotlist.sh
$screenshottext = ~/.config/hypr/scripts/screenshot_text.sh
$todo = ~/.config/hypr/scripts/todo_toggle.sh
$updates = ~/.config/hypr/scripts/updates_toggle.sh
$waybar = ~/.config/hypr/scripts/waybar_toggle.sh

# Quick Launchers
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $discord
bind = $mainMod, E, exec, $filemanager
bind = $mainMod, M, exec, $minecraft

# General
bind = $mainMod, C, exec, $clipboard
bind = $mainMod, N, exec, $network
bind = $mainMod, O, exec, $networkssl
bind = $mainMod, R, exec, $recording
bind = $mainMod, S, exec, $appmenu
bind = $mainMod, W, exec, $waybar
bind = $mainMod, X, exec, $todo
bind = , print, exec, $screenshot
bind = $mainMod, print, exec, $screenshottext

# System
bind = $mainMod SHIFT, Q, exec, $logout
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, U, exec, $updates

##################
# Window Control #
##################

# Misc
bind = $mainMod, F, fullscreen,
bind = $mainMod, J, layoutmsg, fit visible
bind = $mainMod, K, layoutmsg, promote
bind = $mainMod, P, pseudo,
bind = $mainMod, Q, killactive,
bind = $mainMod, T, togglefloating,

# Resize windows with mainMod + Control + arrow keys
bind = $mainMod SHIFT, left, layoutmsg, colresize -conf
bind = $mainMod SHIFT, right, layoutmsg, colresize +conf
# bind = $mainMod SHIFT, up, resizeactive, 0 -100
# bind = $mainMod SHIFT, down, resizeactive, 0 100

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move windows around with mainMod + Shift + arrow keys
bind = $mainMod CTRL, left, layoutmsg, swapcol l
bind = $mainMod CTRL, right, layoutmsg, swapcol r
# bind = $mainMod CTRL, up, resizeactive, 0 -100
# bind = $mainMod CTRL, down, resizeactive, 0 100

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, workspace, e-1
bind = $mainMod, down, workspace, e+1

# Move active window to a workspace with mainMod + SHIFT + [1-5]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5

#####################
# Workspace Control #
#####################

# Switch workspaces with mainMod + [1-5]
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1


########
# Misc #
########

# Blue filter shader
bindel = $mainMod ,XF86MonBrightnessUp, exec, hyprctl keyword decoration:screen_shader ""
bindel = $mainMod ,XF86MonBrightnessDown, exec, hyprctl keyword decoration:screen_shader ~/.config/hypr/shaders/noblue.glsl


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.0
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Power buttons (not working because hardwired ?)
# bindl = , xF86Sleep, exec, wlogout

# Ignore maximize requests from apps. You'll probably like this.
# windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
